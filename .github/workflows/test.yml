name: tests

on:
  push:
    branches: [main, "linux-port", "macos-port", "v*"]
  pull_request:
    branches: [main]

jobs:

  # ----- Linux: bats suite for tools/linux/ + install.sh -------------------
  linux:
    name: bats (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Probe environment
        run: |
          echo "kernel: $(uname -r)"
          echo "bats:   $(bats --version)"
          echo "systemd-run present: $(command -v systemd-run >/dev/null && echo yes || echo no)"

      - name: Enable systemd --user (so cgroup-kill test exercises strong path)
        # Without linger, the runner's --user systemd instance does not
        # come up at boot. With linger on, default.target activates and
        # the cgroup-kill test exercises the systemd-run --scope path
        # instead of skipping. If linger fails for any reason, the test
        # SKIPS cleanly and prints WHY -- it does not silently pass.
        run: |
          sudo loginctl enable-linger "$USER" || true
          # Give the user manager a couple seconds to start.
          for i in 1 2 3 4 5; do
            if systemctl --user is-active default.target >/dev/null 2>&1; then
              echo "systemd --user active (attempt $i)"
              break
            fi
            sleep 1
          done
          systemctl --user is-active default.target || echo "(--user not active; cgroup test will skip honestly)"

      - name: Run bats suite
        run: |
          chmod +x tools/linux/*.sh install.sh
          bats --print-output-on-failure tests/linux/

  # ----- macOS: bats suite for tools/macos/ + install.sh (MEDIUM tier) ----
  # Matrix covers BOTH architectures on purpose: macos-14 is Apple Silicon
  # (arm64), macos-13 is Intel (x86_64). Process-group / signal / ps
  # behavior is the load-bearing surface here and is exactly the kind of
  # thing that can differ across arch, so fail-fast is off -- an arch-only
  # regression must still surface the other arch's result.
  macos:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        # bats-core is the canonical Homebrew formula (it installs the
        # `bats` binary); the bare `bats` formula is the dead pre-1.0 one.
        run: brew install bats-core

      - name: Probe environment (record which bash actually runs the suite)
        # macOS ships Apple's frozen bash 3.2.57 at /bin/bash, but GitHub
        # runners also put a modern Homebrew bash earlier on PATH. The
        # wrapper is written 3.2-safe by construction; this records in the
        # log which bash the functional suite exercises so the gap is
        # documented, not hidden.
        run: |
          sw_vers
          echo "arch:      $(uname -m)"
          echo "bats:      $(bats --version)"
          echo "PATH bash: $(bash --version | head -1)"
          echo "/bin/bash: $(/bin/bash --version | head -1)  <- Apple stock 3.2.57"

      - name: Static bash-3.2 safety check (parse under Apple stock /bin/bash)
        # bats may run the suite under Homebrew bash, so separately prove
        # the runtime scripts at least PARSE under the frozen 3.2.57 every
        # real macOS user has. Catches syntax-level 3.2 breakage directly
        # instead of trusting the runner's newer bash to stand in for it.
        run: |
          /bin/bash -n tools/macos/claude-jobbed.sh
          /bin/bash -n tools/macos/find-claude.sh
          /bin/bash -n install.sh
          echo "tools/macos/*.sh + install.sh parse clean under bash 3.2.57"

      - name: Run bats suite
        run: |
          chmod +x tools/macos/*.sh install.sh
          bats --print-output-on-failure tests/macos/

  # ----- Windows: existing PowerShell suite (Wave A retroactive coverage) --
  windows:
    name: pwsh (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run all tests/test-*.ps1 files
        shell: pwsh
        # Iterate top-level test files, fail fast on the first non-zero
        # exit. Each test file already has its own pass/fail summary.
        # The job-object integration test requires Windows kernel and
        # is the one we most care about not regressing.
        run: |
          $tests = Get-ChildItem tests\test-*.ps1
          if (-not $tests) { Write-Error "no test files found"; exit 1 }
          foreach ($t in $tests) {
            Write-Host "=== Running $($t.Name) ===" -ForegroundColor Cyan
            & $t.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Error "FAIL: $($t.Name) exited $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          }
          Write-Host "ALL PASS" -ForegroundColor Green
